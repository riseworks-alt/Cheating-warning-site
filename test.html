<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オンラインテスト</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
}

.header{
    background:#ffebee;
    color:#c62828;
    text-align:center;
    padding:10px;
    font-weight:bold;
}

iframe{
    width:100%;
    height:2200px;
    border:none;
}

#counter{
    position:fixed;
    top:10px;
    right:10px;
    background:white;
    border:1px solid #ccc;
    padding:10px;
    z-index:9999;
    border-radius:8px;
    line-height:1.8;
    transition:0.3s;
}
</style>
</head>
<body>

<div class="header">
テスト中は他のタブやアプリを開かないでください
</div>

<div id="counter">
    <div id="leaveCount">
        離脱回数：0
    </div>

    <div id="leaveTime">
        離脱秒数：0 秒
    </div>

    <div id="focusStatus">
        状態：監視中
    </div>
</div>

<iframe id="formFrame"></iframe>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const id = params.get("id");

if(!id){

    document.body.innerHTML =
        "<h1>フォームが指定されていません</h1>";

    throw new Error();
}

const formUrl =
    `https://docs.google.com/forms/d/e/${id}/viewform?embedded=true`;

document
.getElementById("formFrame")
.src = formUrl;

let leaveCount = 0;
let totalLeaveSeconds = 0;

let leftPage = false;
let leaveStartTime = null;

// blur/focus を補助として利用
window.addEventListener(
    "blur",
    () => {

        console.log(
            "[補助検知] フォーカス喪失: " +
            new Date().toLocaleTimeString()
        );

        document
            .getElementById(
                "focusStatus"
            )
            .innerText =
            "状態：フォーカス喪失";
    }
);

window.addEventListener(
    "focus",
    () => {

        console.log(
            "[補助検知] フォーカス復帰: " +
            new Date().toLocaleTimeString()
        );

        document
            .getElementById(
                "focusStatus"
            )
            .innerText =
            "状態：監視中";
    }
);

</script>

</body>
</html>
