<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オンラインテスト</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
}

.header{
    background:#ffebee;
    color:#c62828;
    text-align:center;
    padding:10px;
    font-weight:bold;
}

#userInfo{
    max-width:500px;
    margin:30px auto;
    padding:20px;
    border:1px solid #ddd;
    border-radius:10px;
    text-align:center;
}

#userInfo input{
    width:90%;
    padding:10px;
    font-size:16px;
}

#userInfo button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

iframe{
    width:100%;
    height:2200px;
    border:none;
    display:none;
}

#counter{
    position:fixed;
    top:10px;
    right:10px;
    background:white;
    border:1px solid #ccc;
    padding:10px;
    z-index:9999;
    border-radius:8px;
    line-height:1.8;
    transition:0.3s;
}

#studentInfoDisplay{
    font-size:12px;
    margin-top:5px;
}

</style>
</head>
<body>

<div class="header">
テスト中は他のタブやアプリを開かないでください
</div>

<div id="counter">

    <div id="leaveCount">
        離脱回数：0
    </div>

    <div id="leaveTime">
        離脱秒数：0 秒
    </div>

    <div id="studentInfoDisplay">
        未開始
    </div>

</div>

<div id="userInfo">

    <h2>受験者情報</h2>

    <input
        type="text"
        id="studentName"
        placeholder="氏名"
    >

    <br><br>

    <input
        type="text"
        id="studentId"
        placeholder="学籍番号"
    >

    <br><br>

    <button id="startBtn">
        テスト開始
    </button>

</div>


<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const id =
    params.get("id");

if(!id){

    document.body.innerHTML =
        "<h1>フォームが指定されていません</h1>";

    throw new Error(
        "フォームIDがありません"
    );
}

const formUrl =
`https://docs.google.com/forms/d/e/${id}/viewform`;

let studentName = "";
let studentId = "";

let startTime = null;

const browser =
    navigator.userAgent;

const os =
    navigator.platform;
const APPS_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzX40ecOj8n2KO9GofwIDPwvIoVdoJOH9ruvelseDdGcGFiK0CCvCL3zxfawDQHm5G1PQ/exec";

document
.getElementById("startBtn")
.addEventListener(
    "click",
    () => {

        studentName =
            document
            .getElementById(
                "studentName"
            )
            .value
            .trim();

        studentId =
            document
            .getElementById(
                "studentId"
            )
            .value
            .trim();

        if(
            !studentName ||
            !studentId
        ){

            alert(
                "氏名と学籍番号を入力してください"
            );

            return;
        }

        startTime =
            new Date()
            .toISOString();

        document
            .getElementById(
                "studentInfoDisplay"
            )
            .innerHTML =
            studentName +
            "<br>" +
            studentId;

        document
            .getElementById(
                "userInfo"
            )
            .style.display =
            "none";

        window.location.href = formUrl;
    }
);

async function sendLog(){

    try{

        await fetch(
            APPS_SCRIPT_URL,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({

                    name:
                        studentName,

                    studentId:
                        studentId,

                    leaveCount:
                        leaveCount,

                    leaveSeconds:
                        totalLeaveSeconds,

                    os:
                        os,

                    browser:
                        browser,

                    startTime:
                        startTime,

                    endTime:
                        new Date()
                        .toISOString()

                })
            }
        );

        console.log(
            "ログ送信成功"
        );

    }catch(error){

        console.error(
            "ログ送信失敗",
            error
        );
    }
}
    
let leaveCount = 0;
let totalLeaveSeconds = 0;

let leftPage = false;
let leaveStartTime = null;

document.addEventListener(
    "visibilitychange",
    () => {

        if(document.hidden){

            leftPage = true;

            leaveStartTime =
                Date.now();

            return;
        }

        if(
            !document.hidden &&
            leftPage
        ){

            leaveCount++;

            let leaveSeconds = 0;

            if(
                leaveStartTime
            ){

                leaveSeconds =
                    Math.round(
                        (
                            Date.now() -
                            leaveStartTime
                        ) / 1000
                    );

                totalLeaveSeconds +=
                    leaveSeconds;
            }

            document
                .getElementById(
                    "leaveCount"
                )
                .innerText =
                "離脱回数：" +
                leaveCount;

            document
                .getElementById(
                    "leaveTime"
                )
                .innerText =
                "離脱秒数：" +
                totalLeaveSeconds +
                " 秒";
                sendLog();
            if(
                leaveCount >= 1
            ){

                const counter =
                    document
                    .getElementById(
                        "counter"
                    );

                counter.style.background =
                    "#ff5252";

                counter.style.color =
                    "white";

                counter.style.fontWeight =
                    "bold";
            }

            alert(
                "【警告】\n\n" +
                "テスト画面から離れました。\n\n" +
                "今回の離脱時間：" +
                leaveSeconds +
                " 秒\n" +
                "累計離脱時間：" +
                totalLeaveSeconds +
                " 秒\n" +
                "離脱回数：" +
                leaveCount +
                " 回"
            );

            leftPage = false;
            leaveStartTime = null;
        }
    }
);

console.log(
    "受験者:",
    studentName
);

console.log(
    "学籍番号:",
    studentId
);

console.log(
    "OS:",
    os
);

console.log(
    "ブラウザ:",
    browser
);

window.addEventListener(
    "beforeunload",
    () => {

        sendLog();

    }
);
    
</script>

</body>
</html>
